<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRC Team Performance 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #030712;
      --bg-surface: #0a1120;
      --bg-card: rgba(8, 14, 28, 0.82);
      --bg-card-hover: rgba(14, 22, 40, 0.95);
      --border: rgba(56, 138, 221, 0.1);
      --border-active: rgba(56, 138, 221, 0.32);
      --accent: #378ADD;
      --accent-orange: #D85A30;
      --accent-green: #1D9E75;
      --text-1: #e2e8f0;
      --text-2: #7c8aa0;
      --text-3: #3e4a5c;
      --radius: 10px;
      --radius-sm: 6px;
    }

    html, body {
      height: 100%; background: var(--bg-deep); color: var(--text-1);
      font-family: 'Outfit', sans-serif; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: 272px 1fr;
      grid-template-rows: 52px 1fr;
      height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-green) 100%);
      position: relative;
    }
    .brand-icon::after {
      content: ''; position: absolute; inset: 4px;
      border: 1.5px solid rgba(255,255,255,0.35); border-radius: 3px;
    }
    .brand h1 {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 17px; letter-spacing: -0.02em;
    }
    .brand h1 span { color: var(--text-2); font-weight: 700; font-size: 15px; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .badge {
      padding: 3px 10px; border-radius: 100px;
      background: rgba(56, 138, 221, 0.08);
      border: 1px solid rgba(56, 138, 221, 0.18);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500; color: var(--accent);
      letter-spacing: 0.04em;
    }
    .ctrl-row { display: flex; gap: 5px; }
    .ctrl-btn {
      padding: 5px 11px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: transparent;
      color: var(--text-2); font-family: 'JetBrains Mono', monospace;
      font-size: 10px; cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .ctrl-btn:hover { border-color: var(--border-active); color: var(--text-1); }
    .ctrl-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(55, 138, 221, 0.07);
    }

    /* ── Sidebar ────────────────────────────────── */
    aside {
      border-right: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); position: relative; }
    .search-wrap svg {
      position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 7px 10px 7px 32px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: rgba(3, 7, 18, 0.5); color: var(--text-1);
      font-family: 'Outfit', sans-serif; font-size: 12.5px; outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--text-3); }
    .search-input:focus { border-color: var(--border-active); }
    .sort-row {
      display: flex; gap: 3px; padding: 7px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sort-btn {
      flex: 1; padding: 4px 0; border: 1px solid transparent;
      border-radius: 4px; background: none; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
      cursor: pointer; transition: all 0.2s; text-align: center;
      letter-spacing: 0.02em;
    }
    .sort-btn:hover { color: var(--text-2); }
    .sort-btn.active {
      color: var(--accent); background: rgba(55, 138, 221, 0.07);
      border-color: rgba(55, 138, 221, 0.14);
    }
    .team-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .team-list::-webkit-scrollbar { width: 3px; }
    .team-list::-webkit-scrollbar-track { background: transparent; }
    .team-list::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 2px; }
    .team-item {
      display: flex; align-items: center; padding: 7px 12px;
      cursor: pointer; transition: all 0.12s;
      border-left: 2px solid transparent; gap: 8px;
    }
    .team-item:hover { background: rgba(55, 138, 221, 0.04); }
    .team-item.selected {
      background: rgba(55, 138, 221, 0.07);
      border-left-color: var(--accent);
    }
    .team-item.hovered { background: rgba(55, 138, 221, 0.03); }
    .t-num {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      font-weight: 500; color: var(--text-2); min-width: 44px;
    }
    .t-name {
      flex: 1; font-size: 11.5px; color: var(--text-1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .t-bar {
      width: 28px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.04); overflow: hidden; flex-shrink: 0;
    }
    .t-bar-fill { height: 100%; border-radius: 2px; }
    .t-epa {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      font-weight: 500; color: var(--text-3); min-width: 28px; text-align: right;
    }

    /* ── Viewport ───────────────────────────────── */
    main {
      position: relative; overflow: hidden;
      background: radial-gradient(ellipse at 50% 40%, #0c1832 0%, #050a15 55%, #020408 100%);
    }
    main::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 45%, rgba(3, 7, 18, 0.55) 100%);
      pointer-events: none; z-index: 1;
    }
    #c3d { display: block; width: 100%; height: 100%; cursor: grab; }
    #c3d:active { cursor: grabbing; }

    /* ── Tooltip ────────────────────────────────── */
    #tooltip {
      position: absolute; display: none;
      background: rgba(8, 14, 30, 0.88);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-active);
      border-radius: var(--radius); padding: 12px 15px;
      pointer-events: none; z-index: 20; min-width: 176px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #tooltip.visible { display: block; animation: ttIn 0.12s ease; }
    @keyframes ttIn {
      from { opacity: 0; transform: translateY(4px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .tt-head {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 8px; padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
    }
    .tt-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
    .tt-name { font-size: 11.5px; color: var(--text-2); }
    .tt-grid {
      display: grid; grid-template-columns: auto 1fr; gap: 3px 14px;
      font-size: 10.5px;
    }
    .tt-label { color: var(--text-3); }
    .tt-val { font-family: 'JetBrains Mono', monospace; font-weight: 500; text-align: right; }

    /* ── Axis Labels ────────────────────────────── */
    .axis-label {
      position: absolute; pointer-events: none; z-index: 3;
      font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
      font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
      opacity: 0.6; transform: translate(-50%, -50%);
      text-shadow: 0 0 8px rgba(0,0,0,0.7);
    }

    /* ── Legend / Hint ──────────────────────────── */
    .legend {
      position: absolute; bottom: 14px; right: 14px; z-index: 5;
      display: flex; gap: 14px; align-items: center;
      padding: 7px 14px; background: rgba(8, 14, 30, 0.72);
      backdrop-filter: blur(10px); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 10px; color: var(--text-2);
    }
    .leg-item { display: flex; align-items: center; gap: 5px; }
    .leg-line { width: 14px; height: 2px; border-radius: 1px; }
    .leg-dot {
      width: 7px; height: 7px; border-radius: 50%;
      border: 1px solid rgba(80, 216, 144, 0.45);
      background: rgba(80, 216, 144, 0.12);
    }
    .hint {
      position: absolute; bottom: 14px; left: 14px; z-index: 5;
      font-size: 9.5px; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em;
    }

    /* ── Loader ─────────────────────────────────── */
    .loader {
      position: fixed; inset: 0; background: var(--bg-deep);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 100;
      transition: opacity 0.5s ease 0.1s, visibility 0s 0.6s;
    }
    .loader.done { opacity: 0; visibility: hidden; }
    .loader-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 28px; letter-spacing: 0.05em; color: var(--text-1);
    }
    .loader-sub {
      font-size: 12px; color: var(--text-3); margin-top: 6px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .loader-bar {
      width: 120px; height: 2px; background: rgba(255,255,255,0.06);
      border-radius: 1px; margin-top: 20px; overflow: hidden;
    }
    .loader-fill {
      height: 100%; width: 0; background: var(--accent);
      border-radius: 1px; animation: loaderFill 0.7s ease forwards;
    }
    @keyframes loaderFill { to { width: 100%; } }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 768px) {
      #app { grid-template-columns: 1fr; }
      aside { display: none; }
    }
  </style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-title">FRC</div>
  <div class="loader-sub">2026 &middot; Team Performance</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="app">
  <header>
    <div class="brand">
      <div class="brand-icon"></div>
      <h1>FRC <span>2026</span></h1>
    </div>
    <div class="header-right">
      <span class="badge">27 TEAMS</span>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btnReset" title="Reset view (R)">Reset</button>
        <button class="ctrl-btn" id="btnTop" title="Top-down view">Top</button>
        <button class="ctrl-btn" id="btnFront" title="Front view">Front</button>
        <button class="ctrl-btn active" id="btnAuto" title="Auto-rotate (Space)">Auto ⟲</button>
      </div>
    </div>
  </header>

  <aside>
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search" placeholder="Search teams..." autocomplete="off" spellcheck="false">
    </div>
    <div class="sort-row">
      <button class="sort-btn active" data-sort="epa">EPA</button>
      <button class="sort-btn" data-sort="x">Impact</button>
      <button class="sort-btn" data-sort="y">Synergy</button>
      <button class="sort-btn" data-sort="z">Consist.</button>
    </div>
    <div class="team-list" id="teamList"></div>
  </aside>

  <main id="viewport">
    <canvas id="c3d"></canvas>
    <div id="tooltip"></div>
    <div class="legend">
      <div class="leg-item"><div class="leg-line" style="background:#378ADD"></div>Impact</div>
      <div class="leg-item"><div class="leg-line" style="background:#D85A30"></div>Synergy</div>
      <div class="leg-item"><div class="leg-line" style="background:#1D9E75"></div>Consistency</div>
      <div class="leg-item"><div class="leg-dot"></div>Ideal</div>
      <div class="leg-item" style="color:var(--text-3)">● EPA</div>
    </div>
    <div class="hint">drag · orbit &nbsp;│&nbsp; scroll · zoom &nbsp;│&nbsp; click · select</div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
/* ── Data ─────────────────────────────────────── */
const TEAMS=[
  {team:2583,name:"Orange Dynamite",epa:127.28,x:185.46,y:0.2842,z:0.7824},
  {team:6800,name:"Valor",epa:173.83,x:184.71,y:-0.6099,z:0.64},
  {team:118,name:"Robonauts",epa:152.99,x:173.14,y:2.3747,z:0.6667},
  {team:5572,name:"Rosbots",epa:87.25,x:115.0,y:0.6708,z:0.4913},
  {team:6377,name:"Howdy Bots",epa:79.26,x:102.95,y:0.624,z:0.4056},
  {team:436,name:"Purple Rain",epa:53.42,x:79.47,y:0.3151,z:0.4597},
  {team:5892,name:"Energy HEROs",epa:55.67,x:63.39,y:1.1368,z:0.4213},
  {team:418,name:"Purple Haze",epa:60.51,x:60.14,y:-0.0478,z:0.1526},
  {team:1255,name:"Blarglefish",epa:45.71,x:57.18,y:1.7075,z:0.3024},
  {team:9506,name:"Conspiracy Robotics",epa:45.29,x:54.21,y:-0.1608,z:0.1851},
  {team:5103,name:"MECH&Cheese",epa:31.43,x:45.2,y:-0.1951,z:0},
  {team:6901,name:"Knights Robotics",epa:33.05,x:44.66,y:0.8853,z:0.0382},
  {team:6243,name:"Energy NERDs",epa:25.07,x:41.06,y:-0.0762,z:0},
  {team:7088,name:"Somerset Robodogs",epa:35.43,x:39.21,y:0.7648,z:0},
  {team:3545,name:"Bots in Blue",epa:29.79,x:38.36,y:0.1396,z:0},
  {team:6180,name:"Mechanical Lions",epa:31.34,x:38.08,y:0.6511,z:0.167},
  {team:9577,name:"Recoil",epa:30.07,x:37.93,y:0.1271,z:0.1296},
  {team:2587,name:"DiscoBots",epa:41.45,x:35.23,y:-0.5734,z:0},
  {team:9140,name:"The Robobots",epa:41.47,x:34.66,y:-0.1021,z:0},
  {team:10913,name:"Robot Wranglers",epa:30.11,x:31.28,y:1.2385,z:0},
  {team:8573,name:"Rogue-Rangers LEGACY",epa:19.12,x:27.83,y:0.3465,z:0},
  {team:8750,name:"Tarpontron1cs",epa:21.31,x:27.54,y:-0.2079,z:0},
  {team:2789,name:"TEXPLOSION",epa:30.47,x:24.69,y:-0.3801,z:0.0325},
  {team:11309,name:"Gear Owls",epa:16.02,x:22.85,y:0.7305,z:0},
  {team:7138,name:"Wing It",epa:19.84,x:20.74,y:-0.2414,z:0},
  {team:4076,name:"Texan Robotics",epa:19.4,x:18.3,y:-1.2617,z:0},
  {team:11224,name:"Azreal",epa:22.66,x:14.96,y:1.4238,z:0}
];
const EMIN=16, EMAX=174;
const lerp=(a,b,t)=>a+(b-a)*t;
const sx=v=>v/50, sy=v=>v, sz=v=>v*3;

/* ── Color ────────────────────────────────────── */
function epaColor(epa){
  const t=Math.max(0,Math.min(1,(epa-EMIN)/(EMAX-EMIN)));
  const S=[[0.12,0.20,0.54],[0.24,0.38,0.86],[0.14,0.68,0.72],[0.94,0.68,0.12]];
  const idx=t*(S.length-1), i=Math.min(Math.floor(idx),S.length-2), f=idx-i;
  return new THREE.Color(lerp(S[i][0],S[i+1][0],f),lerp(S[i][1],S[i+1][1],f),lerp(S[i][2],S[i+1][2],f));
}
function epaHex(epa){ return '#'+epaColor(epa).getHexString(); }

/* ── Scene ────────────────────────────────────── */
const viewport=document.getElementById('viewport');
const canvas=document.getElementById('c3d');
const tooltipEl=document.getElementById('tooltip');
let W=viewport.offsetWidth, H=viewport.offsetHeight;

const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,powerPreference:'high-performance'});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,0);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;
renderer.outputEncoding=THREE.sRGBEncoding;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,W/H,0.1,120);
camera.position.set(7,4.5,11);

const controls=new THREE.OrbitControls(camera,canvas);
controls.enableDamping=true;
controls.dampingFactor=0.055;
controls.autoRotate=true;
controls.autoRotateSpeed=0.35;
controls.minDistance=3;
controls.maxDistance=28;
controls.target.set(1.8,0.4,1.1);
controls.maxPolarAngle=Math.PI*0.88;

/* ── Grid & Axes ──────────────────────────────── */
const grid=new THREE.GridHelper(8,16,0x1a2744,0x0e1628);
grid.material.opacity=0.35; grid.material.transparent=true;
grid.position.set(2,-1.6,1.5);
scene.add(grid);

function addAxis(a,b,col){
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a),new THREE.Vector3(...b)]);
  scene.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.7})));
}
addAxis([-0.3,0,0],[4.8,0,0],0x378ADD);
addAxis([0,-1.6,0],[0,3.0,0],0xD85A30);
addAxis([0,0,0],[0,0,3.5],0x1D9E75);

/* ── First Octant Box ─────────────────────────── */
const BW=4,BH=2.5,BD=3,boxGeo=new THREE.BoxGeometry(BW,BH,BD);
const boxFill=new THREE.Mesh(boxGeo,new THREE.MeshBasicMaterial({color:0x50d890,transparent:true,opacity:0.03,side:THREE.DoubleSide,depthWrite:false}));
boxFill.position.set(BW/2,BH/2,BD/2); scene.add(boxFill);
const boxEdge=new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo),new THREE.LineBasicMaterial({color:0x50d890,transparent:true,opacity:0.14}));
boxEdge.position.copy(boxFill.position); scene.add(boxEdge);

/* ── Team Spheres ─────────────────────────────── */
const spheres=[], sphereMap=new Map();
TEAMS.forEach((t,i)=>{
  const n=(t.epa-EMIN)/(EMAX-EMIN);
  const r=0.06+n*0.22;
  const col=epaColor(t.epa);
  const mesh=new THREE.Mesh(
    new THREE.SphereGeometry(r,28,18),
    new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.12+n*0.38,shininess:90,specular:new THREE.Color(0x555555)})
  );
  const target=new THREE.Vector3(sx(t.x),sy(t.y),sz(t.z));
  const startPos=new THREE.Vector3(1.8+Math.sin(i*1.7)*0.4, 0.4+Math.cos(i*2.3)*0.4, 1.1+Math.sin(i*0.9)*0.4);
  mesh.userData={...t,targetPos:target,startPos:startPos,baseRadius:r,baseEmissive:0.12+n*0.38};
  mesh.position.copy(startPos);
  mesh.scale.setScalar(0.01);
  scene.add(mesh); spheres.push(mesh); sphereMap.set(t.team,mesh);
});

/* ── Selection Ring ───────────────────────────── */
const ring=new THREE.Mesh(
  new THREE.RingGeometry(1,1.08,48),
  new THREE.MeshBasicMaterial({color:0x378ADD,transparent:true,opacity:0,side:THREE.DoubleSide,depthTest:false})
);
ring.visible=false; scene.add(ring);

/* ── Background Dust ──────────────────────────── */
const dustGeo=new THREE.BufferGeometry();
const dp=new Float32Array(80*3);
for(let i=0;i<80;i++){dp[i*3]=(Math.random()-0.5)*50;dp[i*3+1]=(Math.random()-0.5)*30;dp[i*3+2]=(Math.random()-0.5)*50;}
dustGeo.setAttribute('position',new THREE.BufferAttribute(dp,3));
scene.add(new THREE.Points(dustGeo,new THREE.PointsMaterial({color:0x2a4070,size:0.04,transparent:true,opacity:0.35})));

/* ── Lighting ─────────────────────────────────── */
scene.add(new THREE.AmbientLight(0x4466aa,0.45));
const dl1=new THREE.DirectionalLight(0xffffff,0.85); dl1.position.set(8,10,7); scene.add(dl1);
const dl2=new THREE.DirectionalLight(0x4488ff,0.3); dl2.position.set(-6,3,-5); scene.add(dl2);
const dl3=new THREE.DirectionalLight(0xff8844,0.18); dl3.position.set(0,-3,9); scene.add(dl3);

/* ── 3D Axis Labels ───────────────────────────── */
const axisLabels=[
  {pos:new THREE.Vector3(5.0,-0.25,0),text:'Impact',color:'#378ADD'},
  {pos:new THREE.Vector3(-0.4,3.15,0),text:'Synergy',color:'#D85A30'},
  {pos:new THREE.Vector3(-0.4,-0.25,3.7),text:'Consistency',color:'#1D9E75'}
];
axisLabels.forEach(l=>{
  const el=document.createElement('div');
  el.className='axis-label'; el.textContent=l.text; el.style.color=l.color;
  viewport.appendChild(el); l.el=el;
});

/* ── State ────────────────────────────────────── */
let selectedTeam=null, hoveredSphere=null, currentSort='epa';
let camAnimTarget=null, camAnimPos=null;
let pointerDown={x:0,y:0};
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2(-10,-10);

/* ── Sidebar Rendering ────────────────────────── */
function renderList(){
  const filter=document.getElementById('search').value.toLowerCase();
  const list=[...TEAMS].filter(t=>!filter||t.name.toLowerCase().includes(filter)||String(t.team).includes(filter));
  list.sort((a,b)=>b[currentSort]-a[currentSort]);
  document.getElementById('teamList').innerHTML=list.map(t=>{
    const n=(t.epa-EMIN)/(EMAX-EMIN);
    return `<div class="team-item${selectedTeam===t.team?' selected':''}" data-team="${t.team}">
      <span class="t-num">${t.team}</span><span class="t-name">${t.name}</span>
      <div class="t-bar"><div class="t-bar-fill" style="width:${Math.round(n*100)}%;background:${epaHex(t.epa)}"></div></div>
      <span class="t-epa">${t.epa.toFixed(0)}</span></div>`;
  }).join('');
}
renderList();

/* ── Select / Deselect ────────────────────────── */
function selectTeam(num){
  selectedTeam=num;
  const mesh=sphereMap.get(num);
  if(!mesh) return;
  ring.visible=true;
  const pos=mesh.userData.targetPos.clone();
  const dir=camera.position.clone().sub(controls.target).normalize();
  camAnimPos=pos.clone().add(dir.multiplyScalar(5));
  camAnimTarget=pos.clone();
  renderList();
  const el=document.querySelector(`.team-item[data-team="${num}"]`);
  if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
}
function deselectTeam(){
  selectedTeam=null; ring.visible=false;
  camAnimTarget=null; camAnimPos=null;
  renderList();
}

/* ── Sidebar Events ───────────────────────────── */
document.getElementById('teamList').addEventListener('click',e=>{
  const item=e.target.closest('.team-item');
  if(item) selectTeam(+item.dataset.team);
});
let hoveredListTeam=null;
document.getElementById('teamList').addEventListener('mouseover',e=>{
  const item=e.target.closest('.team-item');
  const team=item?+item.dataset.team:null;
  if(team===hoveredListTeam) return;
  if(hoveredListTeam){const m=sphereMap.get(hoveredListTeam);if(m)m.material.emissiveIntensity=m.userData.baseEmissive;}
  hoveredListTeam=team;
  if(team){const m=sphereMap.get(team);if(m)m.material.emissiveIntensity=m.userData.baseEmissive+0.25;}
});
document.getElementById('teamList').addEventListener('mouseleave',()=>{
  if(hoveredListTeam){const m=sphereMap.get(hoveredListTeam);if(m)m.material.emissiveIntensity=m.userData.baseEmissive;hoveredListTeam=null;}
});
document.getElementById('search').addEventListener('input',renderList);
document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentSort=btn.dataset.sort; renderList();
  });
});

/* ── Canvas Pointer ───────────────────────────── */
canvas.addEventListener('pointerdown',e=>{ pointerDown={x:e.clientX,y:e.clientY}; });
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(spheres);
  if(hits.length){
    const mesh=hits[0].object, d=mesh.userData;
    if(hoveredSphere!==mesh){
      resetHover();
      hoveredSphere=mesh;
      mesh.material.emissiveIntensity=d.baseEmissive+0.3;
      mesh.scale.setScalar(1.18);
      canvas.style.cursor='pointer';
    }
    const lx=e.clientX-rect.left, ly=e.clientY-rect.top;
    tooltipEl.className='visible';
    tooltipEl.style.left=Math.min(lx+16,rect.width-196)+'px';
    tooltipEl.style.top=Math.max(ly-130,8)+'px';
    tooltipEl.innerHTML=`<div class="tt-head"><span class="tt-num">${d.team}</span><span class="tt-name">${d.name}</span></div>
      <div class="tt-grid">
        <span class="tt-label">EPA</span><span class="tt-val" style="color:${epaHex(d.epa)}">${d.epa.toFixed(1)}</span>
        <span class="tt-label" style="color:#378ADD">Impact</span><span class="tt-val">${d.x.toFixed(1)}</span>
        <span class="tt-label" style="color:#D85A30">Synergy</span><span class="tt-val">${d.y.toFixed(3)}</span>
        <span class="tt-label" style="color:#1D9E75">Consist.</span><span class="tt-val">${d.z.toFixed(3)}</span></div>`;
  } else { resetHover(); tooltipEl.className=''; }
});
canvas.addEventListener('mouseleave',()=>{ resetHover(); tooltipEl.className=''; });
canvas.addEventListener('click',e=>{
  const dx=e.clientX-pointerDown.x, dy=e.clientY-pointerDown.y;
  if(Math.sqrt(dx*dx+dy*dy)>5) return;
  const rect=canvas.getBoundingClientRect();
  const mx=((e.clientX-rect.left)/rect.width)*2-1;
  const my=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(new THREE.Vector2(mx,my),camera);
  const hits=raycaster.intersectObjects(spheres);
  hits.length? selectTeam(hits[0].object.userData.team) : deselectTeam();
});
function resetHover(){
  if(!hoveredSphere) return;
  hoveredSphere.material.emissiveIntensity=hoveredSphere.userData.baseEmissive;
  hoveredSphere.scale.setScalar(1);
  hoveredSphere=null; canvas.style.cursor='grab';
}

/* ── Camera Presets ────────────────────────────── */
function flyCamera(pos,target,dur=750){
  const sp=camera.position.clone(), st=controls.target.clone(), t0=performance.now();
  (function step(){
    const t=Math.min((performance.now()-t0)/dur,1);
    const e=1-Math.pow(1-t,3);
    camera.position.lerpVectors(sp,pos,e);
    controls.target.lerpVectors(st,target,e);
    if(t<1) requestAnimationFrame(step);
  })();
}
document.getElementById('btnReset').onclick=()=>{ deselectTeam(); flyCamera(new THREE.Vector3(7,4.5,11),new THREE.Vector3(1.8,0.4,1.1)); };
document.getElementById('btnTop').onclick=()=>flyCamera(new THREE.Vector3(2,13,1.5),new THREE.Vector3(2,0,1.5));
document.getElementById('btnFront').onclick=()=>flyCamera(new THREE.Vector3(2,0.6,14),new THREE.Vector3(2,0.6,1.5));
document.getElementById('btnAuto').onclick=()=>{
  controls.autoRotate=!controls.autoRotate;
  document.getElementById('btnAuto').classList.toggle('active',controls.autoRotate);
};

/* ── Keyboard ─────────────────────────────────── */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='Escape') deselectTeam();
  if(e.key==='r'||e.key==='R') document.getElementById('btnReset').click();
  if(e.key===' '){ e.preventDefault(); document.getElementById('btnAuto').click(); }
});

/* ── Resize ───────────────────────────────────── */
window.addEventListener('resize',()=>{
  W=viewport.offsetWidth; H=viewport.offsetHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

/* ── Animation Loop ───────────────────────────── */
const t0=performance.now();
(function animate(){
  requestAnimationFrame(animate);
  const elapsed=(performance.now()-t0)/1000;

  /* Entry animation */
  if(elapsed<2.5){
    spheres.forEach((m,i)=>{
      const delay=i*0.04;
      const t=Math.max(0,Math.min(1,(elapsed-0.3-delay)/0.7));
      const e=1-Math.pow(1-t,4);
      m.position.lerpVectors(m.userData.startPos, m.userData.targetPos, e);
      m.scale.setScalar(Math.max(0.01,e));
    });
  }

  /* Selection ring */
  if(ring.visible&&selectedTeam!==null){
    const mesh=sphereMap.get(selectedTeam);
    if(mesh){
      ring.position.copy(mesh.userData.targetPos);
      ring.lookAt(camera.position);
      const pulse=0.5+0.5*Math.sin(elapsed*3);
      ring.material.opacity=0.2+pulse*0.25;
      ring.scale.setScalar(mesh.userData.baseRadius*4.5);
    }
  }

  /* Camera smooth follow for selection */
  if(camAnimTarget&&camAnimPos){
    camera.position.lerp(camAnimPos,0.035);
    controls.target.lerp(camAnimTarget,0.035);
    if(camera.position.distanceTo(camAnimPos)<0.05){ camAnimTarget=null; camAnimPos=null; }
  }

  /* 3D axis labels */
  axisLabels.forEach(l=>{
    const v=l.pos.clone().project(camera);
    if(v.z>1){l.el.style.display='none';return;}
    l.el.style.display='block';
    l.el.style.left=((v.x+1)/2*W)+'px';
    l.el.style.top=((-v.y+1)/2*H)+'px';
  });

  controls.update();
  renderer.render(scene,camera);
})();

/* ── Loader dismiss ───────────────────────────── */
setTimeout(()=>document.getElementById('loader').classList.add('done'),700);
</script>
</body>
